name: RAG CI/CD Pipeline
 
on:
  push:
    branches: [ "main" ]    
  pull_request:
    branches: [ "main" ]   
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
 
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.1"
 
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
 
    - name: Run tests
      run: |
        echo "No tests yet, add pytest later"
 
    - name: Build Docker image
      run: |
        docker build -t enterprise-capstone .
 
    - name: Push to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - run: |
        docker tag enterprise-capstone ${{ secrets.DOCKER_USERNAME }}/enterprise-capstone:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-capstone:latest
 
 